# Protokoll (Meeting Minutes) — recipe definition
# This is a YAML equivalent of protokoll.tex.jinja

template:
  name: protokoll
  description: "Mötesprotokoll / Meeting minutes"
  lang: sv

document:
  title: "{{ data.meeting_type }} -- {{ data.date }}"
  page_template: "{{ data.page_template | default('formal') }}"
  metadata:
    - label: "Datum:"
      field: date
      suffix_fields: [time_start, time_end]
      suffix_separator: " -- "
    - label: "Plats:"
      field: location
      optional: true
    - label: "Ordförande:"
      field: chair
      optional: true
    - label: "Sekreterare:"
      field: secretary
      optional: true
    - label: "Närvarande:"
      field: attendees
    - label: "Justerare:"
      field: adjusters
      optional: true

components:
  - type: heading
    data_map:
      title: meeting_type
      subtitle: meeting_number
    options:
      subtitle_prefix: "Nr "

  - type: description_list
    options:
      source: document.metadata

  - type: agenda
    data_map:
      items: agenda_items
    options:
      numberingStyle: decimal
      decisionLabel: "Beslut:"

schema: schema.json
